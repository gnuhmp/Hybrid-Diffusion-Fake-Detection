# HyD-Fake full model — BERT text features (768-d)
type: hyd_fake
description: HyDFakeModel on Politifact + BERT embeddings

dataset: politifact
encoder: bert

raw_dir: data/raw
interim_dir: data/interim
output_dir: outputs/hyd_fake

epochs: 72
batch_size: 16
hidden_dim: 256
lr: 0.001
patience: 30
seed: 42

no_augment: false
prune: false
num_workers: 0
num_gat_layers: 4
edge_prune_threshold: 0.05
warmup_ratio: 0.1
