# UPFD baseline — SBERT embeddings (384-d)
type: baseline
description: BiGCN baseline on Politifact with sentence-transformers features

dataset: politifact
encoder: sbert
model: bigcn

raw_dir: data/raw
interim_dir: data/interim
output_dir: outputs

epochs: 100
batch_size: 128
hidden_dim: 128
lr: 0.001
patience: 30
